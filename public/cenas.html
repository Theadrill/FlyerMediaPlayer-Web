<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cenas - FlyerMediaPlayer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --card-hover: #252525;
      --active: #00b894;
      --active-bg: #002b22;
      --text: #eee;
      --text-muted: #666;
      --radius: 12px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      color: var(--text);
      overflow-y: auto;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #222;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: var(--active);
      box-shadow: 0 0 8px var(--active);
    }

    .status-dot.disconnected {
      background: #e74c3c;
    }

    .status-text {
      font-size: 15px;
      color: var(--text-muted);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .scene-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .scene-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 18px 20px;
      background: var(--card);
      border: 2px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 18px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      min-height: 64px;
    }

    .scene-btn:hover,
    .scene-btn:focus-visible {
      background: var(--card-hover);
      outline: none;
    }

    .scene-btn:active {
      transform: scale(0.98);
    }

    .scene-btn.active {
      background: var(--active-bg);
      border-color: var(--active);
    }

    .scene-btn .check {
      margin-left: auto;
      color: var(--active);
      font-size: 22px;
      font-weight: 700;
    }

    .empty-msg {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
      font-size: 16px;
    }

    .error-msg {
      text-align: center;
      color: #e74c3c;
      padding: 20px 0;
      font-size: 15px;
    }

    .refresh-btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: transparent;
      border: 1px solid #333;
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .refresh-btn:hover {
      background: var(--card);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="status-dot disconnected" id="statusDot"></div>
      <div>
        <div class="title">Cenas</div>
        <div class="status-text" id="statusText">Conectando ao OBS...</div>
      </div>
    </div>

    <div class="scene-list" id="sceneList">
      <div class="empty-msg">Carregando cenas...</div>
    </div>

    <button class="refresh-btn" id="refreshBtn">Atualizar</button>
  </div>

  <script>
    const sceneList = document.getElementById('sceneList');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const refreshBtn = document.getElementById('refreshBtn');

    let scenes = [];
    let activeScene = '';
    let switching = false;

    function updateStatus(connected) {
      statusDot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
      statusText.textContent = connected ? 'Conectado ao OBS' : 'Desconectado';
    }

    function renderScenes() {
      if (scenes.length === 0) {
        sceneList.innerHTML = '<div class="empty-msg">Nenhuma cena encontrada</div>';
        return;
      }

      sceneList.innerHTML = scenes.map(scene => {
        const isActive = scene === activeScene;
        return `
          <button class="scene-btn ${isActive ? 'active' : ''}"
                  data-scene="${scene.replace(/"/g, '&quot;')}"
                  ${switching ? 'disabled' : ''}>
            ${scene}
            ${isActive ? '<span class="check">&#10003;</span>' : ''}
          </button>
        `;
      }).join('');
    }

    function attachListeners() {
      sceneList.querySelectorAll('.scene-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (switching || btn.disabled) return;
          const scene = btn.dataset.scene;
          if (scene === activeScene) return;

          switching = true;
          btn.disabled = true;
          btn.textContent = 'Trocando...';

          try {
            const res = await fetch('/api/obs/switch-scene', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ scene }),
            });
            const data = await res.json();
            if (data.success) {
              activeScene = scene;
              renderScenes();
              attachListeners();
            } else {
              btn.textContent = 'Erro!';
              setTimeout(() => { btn.textContent = scene; btn.disabled = false; }, 1000);
            }
          } catch {
            btn.textContent = 'Erro!';
            setTimeout(() => { btn.textContent = scene; btn.disabled = false; }, 1000);
          }

          switching = false;
        });
      });
    }

    async function fetchScenes() {
      try {
        const res = await fetch('/api/obs/scenes');
        const data = await res.json();

        updateStatus(data.connected);

        if (data.connected) {
          scenes = data.scenes;
          activeScene = data.activeScene;
          renderScenes();
          attachListeners();
        } else {
          sceneList.innerHTML = '<div class="error-msg">OBS WebSocket n\u00e3o est\u00e1 conectado.<br>Verifique se o OBS est\u00e1 aberto e o WebSocket configurado.</div>';
        }
      } catch {
        updateStatus(false);
        sceneList.innerHTML = '<div class="error-msg">Erro ao conectar com o servidor.<br>Verifique se o servidor est\u00e1 rodando.</div>';
      }
    }

    refreshBtn.addEventListener('click', fetchScenes);

    // Keyboard shortcuts: number keys 1-9 for first 9 scenes
    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '9') {
        const idx = parseInt(e.key, 10) - 1;
        const btns = sceneList.querySelectorAll('.scene-btn');
        if (btns[idx]) {
          btns[idx].click();
        }
      }
    });

    // Auto-refresh every 3 seconds
    fetchScenes();
    setInterval(fetchScenes, 3000);
  </script>
</body>
</html>
