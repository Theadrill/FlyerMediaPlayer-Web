<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyerMediaPlayer - Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #placeholder {
      color: #555;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      position: absolute;
    }
  </style>
</head>
<body>
  <div id="placeholder">Aguardando player...</div>
  <canvas id="preview"></canvas>
  <script>
    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');

    window.electronAPI.onFrameUpdate((data) => {
      if (!data || !data.width || !data.height) return;

      if (canvas.width !== data.width || canvas.height !== data.height) {
        canvas.width = data.width;
        canvas.height = data.height;
      }

      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0);
        placeholder.style.display = 'none';
      };
      img.src = data.dataURL;
    });

    let isDragging = false;
    let startX = 0;
    let startY = 0;

    canvas.addEventListener('mousedown', (e) => {
      if (e.button === 0) { // Left click only
        isDragging = true;
        startX = e.screenX;
        startY = e.screenY;
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.screenX - startX;
        const deltaY = e.screenY - startY;
        startX = e.screenX;
        startY = e.screenY;
        if (window.electronAPI && window.electronAPI.moveWindow) {
          window.electronAPI.moveWindow(deltaX, deltaY);
        }
      }
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    window.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (window.electronAPI && window.electronAPI.showContextMenu) {
        window.electronAPI.showContextMenu();
      }
    });

    canvas.addEventListener('dblclick', () => {
      if (window.electronAPI && window.electronAPI.toggleAlwaysOnTop) {
        window.electronAPI.toggleAlwaysOnTop();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        if (window.electronAPI && window.electronAPI.requestAdvance) {
          window.electronAPI.requestAdvance();
        }
      }
    });
  </script>
</body>
</html>
